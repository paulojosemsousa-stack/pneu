*{box-sizing:border-box;margin:0;padding:0}

body{background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,sans-serif;font-size:13px;min-height:100vh}
input,select,textarea{background:#0d1117;color:var(--t);border:1px solid var(--b);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none;width:100%;box-sizing:border-box}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;border-bottom:1px solid #30363d;color:#8b949e;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:7px 10px;border-bottom:1px solid #21262d;color:#e6edf3}
tr:hover td{background:#1c2128}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
.surf{background:#0d1117;border:1px solid #21262d;border-radius:7px;padding:10px}
.lbl{display:block;color:#8b949e;font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
@media print{
  #no-print{display:none!important}
  body,div{background:#fff!important;color:#000!important}
  .card{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}
  table,th,td{color:#000!important;border-color:#ccc!important}
  th{background:#f5f5f5!important}
}
</style>

function fmtDate(d){if(!d)return"—";const p=d.split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;}
function getTT(tireTypes,code){return tireTypes.find(t=>t.code===code)||tireTypes[0]||{recapKm:100000,minSulco:4,name:"?",code:"?",color:"#888"};}
function gts(tire,tt,odo){
  if(!tire||!tire.serial)return"empty";
  if(tire.condition==="critico")return"critical";
  if(tire.condition==="atencao")return"warning";
  if(!tt)return"ok";
  const rc=Math.min(tire.recapCount||0,RF.length-1),f=RF[rc];
  const th=tt.recapKm*f,u=Math.max(0,(odo||0)-(tire.kmInstalled||0));
  return(th-u)<=0?"critical":(th-u)<=WARN_KM?"warning":"ok";
}
function gkl(tire,tt,odo){
  if(!tire||!tire.serial||!tt)return null;
  const rc=Math.min(tire.recapCount||0,RF.length-1),f=RF[rc];
  return tt.recapKm*f-Math.max(0,(odo||0)-(tire.kmInstalled||0));
}
function calcCPK(tire,odo){
  if(!tire||!tire.serial)return null;
  const km=Math.max(1,(odo||0)-(tire.kmInstalled||0));
  const cost=(tire.purchaseCost||0)+(tire.recapCostList||[]).reduce((s,c)=>s+c,0);
  return cost?cost/km*1000:null;
}
function wearRate(ms){
  if(!ms||ms.length<2)return null;
  const s=[...ms].sort((a,b)=>a.km-b.km),f=s[0],l=s[s.length-1],d=l.km-f.km;
  return d<500?null:(f.mm-l.mm)/d;
}
function predKm(ms,lim){
  const r=wearRate(ms);if(!r||r<=0)return null;
  const l=[...ms].sort((a,b)=>b.km-a.km)[0];
  return l.mm<=lim?0:Math.round((l.mm-lim)/r);
}

function routeScore(r){if(!r)return 10;const s=10-((r.slopeLevel==="high"?3:r.slopeLevel==="medium"?1.5:0)+(r.curveLevel==="high"?2:r.curveLevel==="medium"?1:0)+(r.trafficLevel==="high"?1.5:r.trafficLevel==="medium"?.5:0)+(10-r.conservationScore)*.3);return Math.max(1,Math.round(s*10)/10);}

function fStats(v,templates,tireTypes){

  return{

    warn:act.filter(p=>gts(v.tires&&v.tires[p.id],getTT(tireTypes,p.t),v.odometer)==="warning").length,
    ok:act.filter(p=>gts(v.tires&&v.tires[p.id],getTT(tireTypes,p.t),v.odometer)==="ok").length,

}
function getAlerts(fleet,templates,tireTypes,sulcoData){
  const a=[];
  fleet.forEach(v=>{
    const tmpl=templates.find(t=>t.id===v.templateId);if(!tmpl)return;
    tmpl.positions.forEach(p=>{
      if(p.t==="ESP")return;
      const tire=v.tires&&v.tires[p.id];if(!tire||!tire.serial)return;
      const tt=getTT(tireTypes,p.t),kl=gkl(tire,tt,v.odometer);

      const ms=sulcoData[v.id+"_"+p.id];
