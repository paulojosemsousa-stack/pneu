// Helpers
function gts(t,pt,odo){if(!t||!t.serial)return"empty";if(t.condition==="critico")return"critical";if(t.condition==="atencao")return"warning";const rc=t.recapCount||0,f=rc<RF.length?RF[rc]:.5,th=(RKM[pt]||1e5)*f,u=Math.max(0,(odo||0)-(t.kmInstalled||0));return(th-u)<=0?"critical":(th-u)<=WARN_KM?"warning":"ok";}
function gkl(t,pt,odo){if(!t||!t.serial)return null;const rc=t.recapCount||0,f=rc<RF.length?RF[rc]:.5;return(RKM[pt]||1e5)*f-Math.max(0,(odo||0)-(t.kmInstalled||0));}
function cpk(t,odo){if(!t||!t.serial)return null;const km=Math.max(1,(odo||0)-(t.kmInstalled||0)),cost=(t.purchaseCost||0)+(t.recapCostList||[]).reduce((s,c)=>s+c,0);return cost?cost/km*1000:null;}
function wearRate(ms){if(!ms||ms.length<2)return null;const s=[...ms].sort((a,b)=>a.km-b.km),f=s[0],l=s[s.length-1],d=l.km-f.km;return d<500?null:(f.mm-l.mm)/d;}
function predKm(ms,lim){const r=wearRate(ms);if(!r||r<=0)return null;const l=[...ms].sort((a,b)=>b.km-a.km)[0];return l.mm<=lim?0:Math.round((l.mm-lim)/r);}
function sst(mm){return mm==null?"empty":mm<=SULCO_RECAP?"critical":mm<=SULCO_WARN?"warning":"ok";}
function fmt(n){return typeof n==="number"?n.toLocaleString("pt-BR"):"—";}
function fmtD(n){return typeof n==="number"?n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function today(){return new Date().toISOString().slice(0,10);}
function getRodSugs(fleet){const s=[];fleet.forEach(v=>{(VT[v.type]||{pos:[]}).pos.forEach(p=>{if(p.t==="estepe")return;const t=v.tires&&v.tires[p.id];if(!t||!t.serial)return;const rc=t.recapCount||0,f=rc<RF.length?RF[rc]:.5,th=(RKM[p.t]||1e5)*f,u=Math.max(0,v.odometer-(t.kmInstalled||0)),pct=u/th*100;if(pct>=80&&p.t==="direcional")s.push({vehicleId:v.id,plate:v.plate,fromPos:p.id,fromLbl:p.lbl,toType:"Livre / Carreta",reason:pct.toFixed(0)+"% vida útil",serial:t.serial});if(pct>=75&&p.t==="tracao")s.push({vehicleId:v.id,plate:v.plate,fromPos:p.id,fromLbl:p.lbl,toType:"Livre",reason:pct.toFixed(0)+"% vida útil",serial:t.serial});});});return s;}
