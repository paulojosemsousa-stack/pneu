td{padding:7px 10px;border-bottom:1px solid #21262d;color:#e6edf3}
tr:hover td{background:#1c2128}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
.surf{background:#0d1117;border:1px solid #21262d;border-radius:7px;padding:10px}
.lbl{display:block;color:#8b949e;font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.nav-btn{padding: 10px 15px; background: transparent; border: none; color: #8b949e; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent;}
.nav-btn.active{color: #e6edf3; border-bottom: 2px solid #388bfd; font-weight: 600;}
@media print{
  #no-print{display:none!important}
  body,div{background:#fff!important;color:#000!important}
  .card{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}
  table,th,td{color:#000!important;border-color:#ccc!important}

}

function uid(){return"id"+Date.now()+Math.random().toString(36).slice(2,6);}
function fmt(n){return typeof n==="number"?n.toLocaleString("pt-BR"):"—";}
function fmtR(n){return typeof n==="number"?n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function today(){return new Date().toISOString().slice(0,10);}
function getTT(tireTypes,code){return tireTypes.find(t=>t.code===code)||tireTypes[0];}
function gts(tire,tt,odo){
  if(!tire||!tire.serial)return"empty";
  if(tire.condition==="critico")return"critical";
  if(tire.condition==="atencao")return"warning";
  if(!tt)return"ok";
  return "ok"; // simplificado para UI
}
function gkl(tire,tt,odo){ return 10000; }
function calcCPK(tire,odo){ return null; }
function sst(mm){return mm==null?"empty":mm<=SULCO_RECAP?"critical":mm<=SULCO_WARN?"warning":"ok";}
const ssC={empty:"#6e7681",ok:C.green,warning:C.yellow,critical:C.red};
function routeScore(r){if(!r)return 10;const s=10-((r.slopeLevel==="high"?3:r.slopeLevel==="medium"?1.5:0)+(r.curveLevel==="high"?2:r.curveLevel==="medium"?1:0)+(r.trafficLevel==="high"?1.5:r.trafficLevel==="medium"?.5:0)+(10-r.conservationScore)*.3);return Math.max(1,Math.round(s*10)/10);}
function routeWear(r){return r?2-routeScore(r)/10:1;}

        h("div",null,h("label",{className:"lbl"},"Nome da Rota"),h("input",{value:form.name,onChange:e=>sf("name",e.target.value),placeholder:"SP → CWB"})),

        h("div",null,h("label",{className:"lbl"},"Distância (km)"),h("input",{type:"number",value:form.distance,onChange:e=>sf("distance",+e.target.value)}))

      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"10px"}},
        h("div",null,h("label",{className:"lbl"},"Tipo de Via"),h("select",{value:form.roadType,onChange:e=>sf("roadType",e.target.value)},Object.entries(roadL).map(([k,v])=>h("option",{key:k,value:k},v)))),

      // FINAL DA ABA DE ROTAS RECUPERADA E CONCLUÍDA
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",marginBottom:"14px"}},
        h("div",null,h("label",{className:"lbl"},"Tráfego"),h("select",{value:form.trafficLevel,onChange:e=>sf("trafficLevel",e.target.value)},Object.entries(lvlL).map(([k,v])=>h("option",{key:k,value:k},v)))),
        h("div",null,h("label",{className:"lbl"},"Conservação (1-10)"),h("input",{type:"number",min:"1",max:"10",value:form.conservationScore,onChange:e=>sf("conservationScore",+e.target.value)})),
        h("div",null,h("label",{className:"lbl"},"Score Estimado"),h("div",{style:{fontSize:"20px",fontFamily:"monospace",fontWeight:"bold",color:C.blue,paddingTop:"5px"}},routeScore(form)+"/10"))
      ),
      h("div",{style:{display:"flex",gap:"8px",marginTop:"15px"}},
        h("button",{style:B.g({flex:1}),onClick:()=>{setForm(null);setEditId(null);}},"Cancelar"),
        h("button",{style:B.p({flex:2}),onClick:()=>{onSaveRoute(form);setForm(null);setEditId(null);}},"Salvar Rota")
      )
    )
  );

  return h("div", null,
    h("div", {style:{display:"flex",justifyContent:"space-between",marginBottom:"14px"}},
      h("h3", null, "Gestão de Rotas"),
      h("button", {style:B.b(), onClick:()=>setForm({companyId:myCompanies[0]?.id||"",name:"",origin:"",destination:"",distance:0,roadType:"paved",curveLevel:"low",slopeLevel:"low",trafficLevel:"medium",conservationScore:8})}, "+ Nova Rota")
    ),
    routes.map(r => h("div", {key:r.id, className:"card", style:{marginBottom:"8px", display:"flex", justifyContent:"space-between"}},
      h("div", null, h("div", {style:{fontWeight:"bold", fontSize:"14px"}}, r.name), h("div", {style:{color:"#8b949e", fontSize:"12px", marginTop:"3px"}}, r.origin + " → " + r.destination)),
      h("button", {style:B.sm(), onClick:()=>{setForm(r); setEditId(r.id);}}, "Editar")
    ))
  );
}

// ────────────────────────────── NOVA ABA: GESTÃO DE ENGATES ──────────────────────────────
function EngatesTab({fleet, templates, engatesHist, onEngatar, onDesengatar}) {
  const [selCavId, setSelCavId] = useState(null);
  
  // Lógica Relacional: Separando Cavalos (Trator/Rígido) de Implementos (Reboque/Dolly)
  const cavalos = fleet.filter(v => {
    const tmpl = templates.find(t => t.id === v.templateId);
    return tmpl && (tmpl.cat === "Trator" || tmpl.cat === "Rígido");
  });
  
  const implementosLivres = fleet.filter(v => {
    const tmpl = templates.find(t => t.id === v.templateId);
    return tmpl && (tmpl.cat === "Reboque" || tmpl.cat === "Dolly") && v.status === "livre";
  });

  const selCav = cavalos.find(c => c.id === selCavId) || cavalos[0];

  return h("div", {style:{display:"grid", gridTemplateColumns:"280px 1fr", gap:"16px", alignItems:"start"}},
    
    // Painel Esquerdo: Lista de Cavalos
    h("div", null,
      h("div", {style:{fontSize:"11px", color:"#8b949e", textTransform:"uppercase", fontWeight:"500", marginBottom:"9px"}}, "Cavalos (Frota)"),
      cavalos.map(cav => {
        const active = selCav && selCav.id === cav.id;
        const linkedCount = (cav.linkedTo || []).length;
        return h("div", {
          key: cav.id, 
          onClick: () => setSelCavId(cav.id),
          className: "card", 
          style: {marginBottom:"6px", cursor:"pointer", borderLeft: active ? `3px solid ${C.blue}` : "1px solid #30363d", background: active ? "#1c2128" : "#161b22"}
        },
          h("div", {style:{display:"flex", justifyContent:"space-between"}},
            h("span", {style:{fontWeight:"bold", fontFamily:"monospace", fontSize:"14px"}}, cav.plate),
            h("span", {style:{fontSize:"11px", color: linkedCount > 0 ? C.green : C.yellow, background: linkedCount > 0 ? C.gbg : C.ybg, padding:"2px 6px", borderRadius:"4px"}}, linkedCount > 0 ? "Em Op." : "Livre")
          ),
          h("div", {style:{fontSize:"11px", color:"#8b949e", marginTop:"4px"}}, cav.brand + " " + cav.model),
          linkedCount > 0 && h("div", {style:{fontSize:"10px", marginTop:"6px", color:C.purple}}, `🔗 ${linkedCount} implemento(s) engatado(s)`)
        );
      })
    ),

    // Painel Direito: Interface de Engate
    selCav ? h("div", {className: "card", style:{minHeight:"400px"}},
      h("div", {style:{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px", paddingBottom:"12px", borderBottom:"1px solid #30363d"}},
        h("div", null, 
          h("div", {style:{fontSize:"11px", color:C.blue, textTransform:"uppercase"}}, "Painel de Composição"),
          h("div", {style:{fontSize:"18px", fontWeight:"bold", fontFamily:"monospace", marginTop:"4px"}}, selCav.plate + " · " + selCav.model)
        ),
        h("div", {style:{textAlign:"right"}},
          h("div", {style:{fontSize:"11px", color:"#8b949e"}}, "Odômetro"),
          h("div", {style:{fontFamily:"monospace", fontWeight:"bold"}}, fmt(selCav.odometer) + " km")
        )
      ),

      // Área de Implementos Engatados
      h("h4", {style:{color:"#e6edf3", marginBottom:"10px", fontSize:"13px"}}, "Composição Atual"),
      (!selCav.linkedTo || selCav.linkedTo.length === 0) 
        ? h("div", {className:"surf", style:{textAlign:"center", padding:"30px 10px", color:"#6e7681", marginBottom:"20px"}}, "Nenhum implemento engatado. Cavalo livre no pátio.")
        : h("div", {style:{display:"grid", gap:"10px", marginBottom:"20px"}}, 
            selCav.linkedTo.map(impId => {
              const imp = fleet.find(f => f.id === impId);
              if(!imp) return null;
              return h("div", {key:imp.id, className:"surf", style:{display:"flex", justifyContent:"space-between", alignItems:"center", borderLeft:`3px solid ${C.purple}`}},
                h("div", null,
                  h("div", {style:{fontWeight:"bold", fontFamily:"monospace", fontSize:"14px"}}, imp.plate),
                  h("div", {style:{fontSize:"11px", color:"#8b949e", marginTop:"2px"}}, imp.brand + " " + imp.model + " · " + fmt(imp.odometer)+"km")
                ),
                h("button", {style:B.dr(), onClick:()=>onDesengatar(selCav.id, imp.id)}, "Desengatar")
              );
            })
          ),

      // Área de Engate (Pátio)
      h("h4", {style:{color:"#e6edf3", marginBottom:"10px", fontSize:"13px"}}, "Pátio (Implementos Livres)"),
      implementosLivres.length === 0 
        ? h("div", {style:{fontSize:"12px", color:"#8b949e"}}, "Não há implementos livres compatíveis no pátio.")
        : h("div", {style:{display:"grid", gridTemplateColumns:"1fr", gap:"8px"}},
            implementosLivres.map(imp => h("div", {key:imp.id, className:"surf", style:{display:"flex", justifyContent:"space-between", alignItems:"center"}},
              h("div", null,
                h("div", {style:{fontWeight:"bold", fontFamily:"monospace", fontSize:"13px"}}, imp.plate),
                h("div", {style:{fontSize:"11px", color:"#8b949e"}}, imp.brand + " " + imp.model)
              ),
              h("button", {style:B.b({padding:"5px 12px"}), onClick:()=>onEngatar(selCav.id, imp.id)}, "🔗 Engatar")
            ))
          ),
      
      // Mini Histórico do Cavalo
      h("div", {style:{marginTop:"30px", borderTop:"1px solid #30363d", paddingTop:"15px"}},
        h("h4", {style:{color:"#8b949e", marginBottom:"10px", fontSize:"11px", textTransform:"uppercase"}}, "Últimos Engates"),
        h("table", {style:{width:"100%", fontSize:"11px"}},
          h("thead", null, h("tr", null, h("th", null, "Data"), h("th", null, "Implemento"), h("th", null, "Ação"))),
          h("tbody", null,
            engatesHist.filter(h => h.cavId === selCav.id).sort((a,b) => new Date(b.dtEngate) - new Date(a.dtEngate)).slice(0,5).map(hist => {
              const imp = fleet.find(f => f.id === hist.impId);
              return h("tr", {key:hist.id},
                h("td", {style:{fontFamily:"monospace"}}, hist.dtEngate.replace("T"," ")),
                h("td", {style:{fontFamily:"monospace"}}, imp ? imp.plate : hist.impId),
                h("td", {style:{color: hist.dtDesengate ? C.yellow : C.green}}, hist.dtDesengate ? "Desengatado" : "Ativo")
              )
            })
          )
        )
      )
    ) : h("div", null)
  );
}

// ────────────────────────────── COMPONENTE PRINCIPAL (APP) ──────────────────────────────
function App() {
  const [tab, setTab] = useState("dash");
  const [fleet, setFleet] = useState(DEF_FLEET);
  const [routes, setRoutes] = useState(DEF_ROUTES);
  const [engatesHist, setEngatesHist] = useState(DEF_ENGATES_HIST);
  const user = DEF_USERS[0];

  // Ações de Rota
  const handleSaveRoute = (routeData) => {
    if(routeData.id) {
      setRoutes(r => r.map(x => x.id === routeData.id ? routeData : x));
    } else {
      setRoutes(r => [...r, {...routeData, id: uid()}]);
    }
  };

  // Ações de Engate Relacional
  const handleEngatar = (cavId, impId) => {
    const dataHora = new Date().toISOString().slice(0,16);
    
    // Atualiza Frota
    setFleet(prev => prev.map(v => {
      if(v.id === cavId) return {...v, status: "em_operacao", linkedTo: [...(v.linkedTo||[]), impId]};
      if(v.id === impId) return {...v, status: "em_operacao", linkedTo: cavId};
      return v;
    }));

    // Registra Histórico (Rastreabilidade)
    setEngatesHist(prev => [{
      id: uid(),
      cavId, impId,
      dtEngate: dataHora,
      odoEngate: fleet.find(f=>f.id===cavId)?.odometer,
      dtDesengate: null,
      odoDesengate: null
    }, ...prev]);
  };

  const handleDesengatar = (cavId, impId) => {
    const dataHora = new Date().toISOString().slice(0,16);
    
    // Atualiza Frota
    setFleet(prev => prev.map(v => {
      if(v.id === cavId) {
        const newLinks = (v.linkedTo||[]).filter(id => id !== impId);
        return {...v, linkedTo: newLinks, status: newLinks.length === 0 ? "livre" : "em_operacao"};
      }
      if(v.id === impId) return {...v, status: "livre", linkedTo: null};
      return v;
    }));

    // Fecha Histórico
    setEngatesHist(prev => prev.map(h => {
      if(h.cavId === cavId && h.impId === impId && !h.dtDesengate) {
        return {...h, dtDesengate: dataHora, odoDesengate: fleet.find(f=>f.id===cavId)?.odometer};
      }
      return h;
    }));
  };

  return h("div", {style:{maxWidth:"1200px", margin:"0 auto", padding:"20px"}},
    // Header & Navegação
    h("header", {style:{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"20px", borderBottom:"1px solid #30363d", paddingBottom:"15px"}},
      h("div", {style:{display:"flex", alignItems:"center", gap:"10px"}},
        h("div", {style:{width:"32px", height:"32px", background:C.blue, borderRadius:"8px", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:"bold", color:"#fff"}}, "TM"),
        h("h1", {style:{fontSize:"20px", fontWeight:"600"}}, `TireMaster Pro v${VER}`)
      ),
      h("div", {style:{display:"flex", gap:"5px"}},
        h("button", {className:`nav-btn ${tab==="dash"?"active":""}`, onClick:()=>setTab("dash")}, "Dashboard"),
        h("button", {className:`nav-btn ${tab==="engates"?"active":""}`, onClick:()=>setTab("engates")}, "🔗 Engates (Control Tower)"),
        h("button", {className:`nav-btn ${tab==="routes"?"active":""}`, onClick:()=>setTab("routes")}, "Rotas")
      )
    ),
    
    // Renderização das Abas
    tab === "dash" && h(DashboardTab, {fleet, templates: DEF_TEMPLATES, tireTypes: DEF_TIRE_TYPES, user}),
    tab === "routes" && h(RoutesTab, {routes, companies: DEF_COMPANIES, onSaveRoute: handleSaveRoute, user}),
    tab === "engates" && h(EngatesTab, {fleet, templates: DEF_TEMPLATES, engatesHist, onEngatar: handleEngatar, onDesengatar: handleDesengatar})
  );
}

// Inicialização do React
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
